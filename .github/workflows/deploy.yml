name: deploy on AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eccomerce-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/eccomerce-backend:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_EC2_KEY }}
          script: |
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sudo sh
            fi

            sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/eccomerce-backend:latest

            sudo docker stop eccomerce-backend || true
            sudo docker rm eccomerce-backend || true

            sudo docker run -d --name eccomerce-backend -p 8000:8000 \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e DATABASE_NAME="${{ secrets.DATABASE_NAME }}" \
              -e DATABASE_USER="${{ secrets.DATABASE_USER }}" \
              -e DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
              -e DATABASE_HOST="${{ secrets.DATABASE_HOST }}" \
              -e DATABASE_PORT="${{ secrets.DATABASE_PORT }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_ACCESS_KEY_SECRET="${{ secrets.AWS_ACCESS_KEY_SECRET }}" \
              -e AWS_STORAGE_BUCKET_NAME="${{ secrets.AWS_STORAGE_BUCKET_NAME }}" \
              -e AWS_S3_REGION_NAME="${{ secrets.AWS_S3_REGION_NAME }}" \
              ${{ secrets.DOCKER_USERNAME }}/eccomerce-backend:latest